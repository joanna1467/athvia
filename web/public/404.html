<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA fallback for GitHub Pages: redirect deep links back to index
      // preserving the path so react-router can handle it.
      sessionStorage.setItem('spa-redirect', location.pathname + location.search)
      location.replace('/athvia/')
    </script>
  </head>
  <body></body>
</html>
